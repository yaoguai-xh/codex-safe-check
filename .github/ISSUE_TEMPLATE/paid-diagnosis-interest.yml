name: Paid diagnosis interest
description: Ask for launch notification or describe a safe Codex diagnosis use case
title: "[Paid diagnosis interest]: "
labels: ["purchase-intent"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for safe public interest before the paid platform link is live.

        Do not paste diagnostic reports, passwords, one-time codes, API keys, access tokens, auth files, full logs, source code, full configuration files, usernames, hostnames, working directories, proxy addresses, identity documents, screenshots containing account details, or payment details.
  - type: dropdown
    id: intent
    attributes:
      label: Intent
      options:
        - I may buy the paid diagnosis when the public platform link is live
        - I want launch notification only
        - I need the free collector only
        - I am asking whether my case fits the paid diagnosis
    validations:
      required: true
  - type: dropdown
    id: symptom_area
    attributes:
      label: Symptom area
      options:
        - Install or command not found
        - Login or browser callback
        - API key or ChatGPT login confusion
        - Proxy, custom CA, TLS, or network
        - CODEX_HOME or local state
        - Version or environment mismatch
        - Other
    validations:
      required: true
  - type: textarea
    id: safe_summary
    attributes:
      label: Safe generalized summary
      description: Describe the problem in one or two sentences without private data.
      placeholder: "Example: Codex works on one machine but login callback fails in WSL2 behind a company proxy."
    validations:
      required: true
  - type: dropdown
    id: timing
    attributes:
      label: Timing
      options:
        - I can wait for the public paid link
        - I only need to know whether this is a good fit
        - I will use the free collector first
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I did not include diagnostic reports, secrets, account details, private paths, hostnames, logs, source code, full configuration, proxy addresses, screenshots, or payment details.
          required: true
